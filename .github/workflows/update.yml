name: War Room Auto-Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
        run: python update.py

      - name: Push updated HTML
        run: |
          git config user.name "War Room Bot"
          git config user.email "bot@warroom.local"
          git add index.html
          git diff --staged --quiet || git commit -m "⚔️ Auto-update $(date -u '+%H:%M UTC')"
          git push origin main
